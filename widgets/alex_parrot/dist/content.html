<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      overflow: hidden;
      padding: 8px 0;
    }
    .marquee-wrapper {
      width: 100%;
      overflow: hidden;
    }
    .marquee-track {
      display: flex;
      width: max-content;
      animation: scroll 20s linear infinite;
    }
    .marquee-track img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin: 0 8px;
    }
    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
