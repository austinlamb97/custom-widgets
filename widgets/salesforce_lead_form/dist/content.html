<script src="https://static.customer-hub.northpass.com/widget-sdk/latest/index.umd.js"></script>

<div class="sf-widget-container">
  <div class="guest-overlay" style="display: none;">
    <div class="guest-overlay-message">
      Sign in to submit a lead referral
    </div>
  </div>

  <h2>Partner Lead Referral</h2>
  <form id="leadForm">
    <div class="form-row">
      <div class="form-col">
        <label for="firstName">First Name <span class="required">*</span></label>
        <input type="text" id="firstName" name="firstName" required>
      </div>
      <div class="form-col">
        <label for="lastName">Last Name <span class="required">*</span></label>
        <input type="text" id="lastName" name="lastName" required>
      </div>
    </div>

    <label for="email">Email <span class="required">*</span></label>
    <input type="email" id="email" name="email" required>

    <label for="company">Company <span class="required">*</span></label>
    <input type="text" id="company" name="company" required>

    <div class="form-row">
      <div class="form-col">
        <label for="title">Title</label>
        <input type="text" id="title" name="title">
      </div>
      <div class="form-col">
        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone">
      </div>
    </div>

    <!--
      PLACEHOLDER FIELDS — confirm custom field API names in Salesforce before go-live.
      Current placeholders:
        region               -> Region__c
        productInterest      -> Product_Interest__c
        helpType             -> Help_Type__c
        partnerNotes         -> Partner_Notes__c
        requestingOnBehalfOf -> Requesting_On_Behalf_Of__c
        referrerEmail        -> Referrer_Email__c
      Update these in both content.html (payload object below) and connectors_registry.json.
    -->

    <label for="region">Region</label>
    <input type="text" id="region" name="region" placeholder="e.g. North America, EMEA">

    <label for="productInterest">Product Interest</label>
    <input type="text" id="productInterest" name="productInterest" placeholder="e.g. CS Platform, PX, Community">

    <label for="helpType">Help Type</label>
    <input type="text" id="helpType" name="helpType" placeholder="e.g. Demo, POC, Pricing">

    <label for="requestingOnBehalfOf">Requesting on Behalf of</label>
    <input type="text" id="requestingOnBehalfOf" name="requestingOnBehalfOf" placeholder="Name or account">

    <label for="referrerEmail">Referrer Email</label>
    <input type="email" id="referrerEmail" name="referrerEmail">

    <label for="partnerNotes">Partner Notes</label>
    <textarea id="partnerNotes" name="partnerNotes" placeholder="Additional context for the sales team"></textarea>

    <!--
      leadSource is set automatically to "Partner Referral" on submit.
      Update the default value below if your SF org uses a different picklist value.
    -->
    <input type="hidden" id="leadSource" name="leadSource" value="Partner Referral">

    <div class="status-message" id="statusMessage" style="display: none;"></div>

    <div class="button-container">
      <button type="submit" id="submitBtn">SUBMIT REFERRAL</button>
    </div>
  </form>
</div>

<style>
  h2 {
    color: #3737b7;
  }
  label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .required {
    color: #c0392b;
  }
  input, textarea {
    width: 100%;
    margin-bottom: 22px;
    padding: 7px;
    box-sizing: border-box;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 3px;
  }
  textarea {
    min-height: 75px;
  }
  .form-row {
    display: flex;
    gap: 16px;
  }
  .form-col {
    flex: 1;
  }
  .button-container {
    text-align: right;
  }
  button {
    background: #3737b7;
    color: #fff;
    font-size: 16px;
    padding: 10px 35px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .status-message {
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-weight: bold;
  }
  .status-message.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }
  .status-message.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }
  .sf-widget-container {
    width: 80%;
    margin: 32px auto;
    border-radius: 16px;
    padding: 28px 22px;
    position: relative;
  }
  .guest-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(128, 128, 128, 0.8);
    backdrop-filter: blur(3px);
    border-radius: 16px;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: all;
  }
  .guest-overlay-message {
    background: #fff;
    color: #333;
    padding: 24px 32px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  }
  .sf-widget-container.guest-mode > *:not(.guest-overlay) {
    pointer-events: none;
  }
  @media (max-width: 600px) {
    .sf-widget-container {
      width: 98vw;
      padding: 10px 5vw;
    }
    .form-row {
      flex-direction: column;
      gap: 0;
    }
  }
</style>

<script>
(() => {
  const widget = document.querySelector('gs-cc-registry-widget[data-widget-type="registry:platform:ootb_widgets:salesforce_lead_form"]');
  if (!widget || !widget.shadowRoot) {
    console.error('Could not find gs-cc-registry-widget or its shadowRoot.');
    return;
  }
  if (widget._sfLeadWidgetInitialized) return;
  widget._sfLeadWidgetInitialized = true;

  const root = widget.shadowRoot;
  const sdk = new WidgetServiceSDK();

  const isGuest = window.inSidedData &&
                  window.inSidedData.user &&
                  window.inSidedData.user.role === 'roles.guest';

  const container = root.querySelector('.sf-widget-container');
  const overlay = root.querySelector('.guest-overlay');

  if (isGuest) {
    if (overlay) overlay.style.display = 'flex';
    if (container) container.classList.add('guest-mode');
    return;
  } else {
    if (overlay) overlay.style.display = 'none';
    if (container) container.classList.remove('guest-mode');
  }

  const showStatus = (message, type) => {
    const el = root.getElementById('statusMessage');
    if (!el) return;
    el.textContent = message;
    el.className = 'status-message ' + type;
    el.style.display = 'block';
    if (type === 'success') {
      setTimeout(() => { el.style.display = 'none'; }, 6000);
    }
  };

  const form = root.getElementById('leadForm');
  if (form) {
    form.addEventListener('submit', e => {
      e.preventDefault();

      const submitBtn = root.getElementById('submitBtn');
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';
      }

      const payload = {
        firstName:            root.getElementById('firstName').value.trim(),
        lastName:             root.getElementById('lastName').value.trim(),
        email:                root.getElementById('email').value.trim(),
        company:              root.getElementById('company').value.trim(),
        title:                root.getElementById('title').value.trim(),
        phone:                root.getElementById('phone').value.trim(),
        leadSource:           root.getElementById('leadSource').value,
        region:               root.getElementById('region').value.trim(),
        productInterest:      root.getElementById('productInterest').value.trim(),
        helpType:             root.getElementById('helpType').value.trim(),
        partnerNotes:         root.getElementById('partnerNotes').value.trim(),
        requestingOnBehalfOf: root.getElementById('requestingOnBehalfOf').value.trim(),
        referrerEmail:        root.getElementById('referrerEmail').value.trim()
      };

      sdk.connectors.execute({
        permalink: "salesforce-create-lead",
        method: "POST",
        payload
      }).then(() => {
        form.reset();
        showStatus('Lead submitted successfully. The sales team will follow up shortly.', 'success');
      }).catch(() => {
        showStatus('Error submitting lead. Please try again or contact support.', 'error');
      }).finally(() => {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'SUBMIT REFERRAL';
        }
      });
    });
  }
})();
</script>
